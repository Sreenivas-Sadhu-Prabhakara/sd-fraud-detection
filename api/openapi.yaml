# API contract — owned by THIS repo (contract-per-repo). Phase 2b-c: real domain.
openapi: 3.0.3
info:
  title: "Fraud Detection — BIAN Semantic API"
  description: >
    BIAN Service Domain 'Fraud Detection' (Monitor) on the 'Fraud Alert
    Monitoring State' control record. Deterministic, explainable scoring
    (LARGE_AMOUNT +70, VELOCITY +50, ROUND_AMOUNT +25; alert at >= 60) over
    account transactions and cheque lodgements; alert investigation lifecycle.
  version: 0.2.0
servers:
  - url: /
  - url: /sd-fraud-detection
    description: through the platform gateway

paths:
  /v1/service-domain:
    get:
      operationId: getServiceDomain
      summary: Service domain metadata
      responses:
        "200": { description: SD identity and BIAN classification }

  /v1/fraud-alert-monitoring-state/evaluate:
    post:
      operationId: evaluateActivity
      summary: "Ingest + score one activity (transaction.posted / cheque.lodged bridge)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountRef, amountMinor]
              properties:
                accountRef: { type: string }
                sourceType: { type: string, enum: [TRANSACTION, CHEQUE], default: TRANSACTION }
                sourceRef: { type: string, description: transactionId or chequeId }
                amountMinor: { type: integer, format: int64, minimum: 1 }
                currency: { type: string, pattern: "^[A-Z]{3}$", default: INR }
      responses:
        "200":
          description: Transparent scoring result (always returned, alert or not)
          content:
            application/json:
              schema:
                type: object
                properties:
                  riskScore: { type: integer }
                  triggeredRules:
                    type: array
                    items: { type: string, enum: [LARGE_AMOUNT, VELOCITY, ROUND_AMOUNT] }
                  alertRaised: { type: boolean }
                  alertId: { type: string, nullable: true }
        "400": { $ref: "#/components/responses/Invalid" }

  /v1/fraud-alert-monitoring-state:
    get:
      operationId: listAlerts
      summary: Retrieve alerts (optionally by status)
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [OPEN, CONFIRMED_FRAUD, FALSE_POSITIVE] }
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FraudAlert" }

  /v1/fraud-alert-monitoring-state/{alertId}/retrieve:
    get:
      operationId: retrieveAlert
      summary: Retrieve
      parameters: [{ $ref: "#/components/parameters/AlertId" }]
      responses:
        "200":
          description: The alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FraudAlert" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/fraud-alert-monitoring-state/{alertId}/control:
    put:
      operationId: resolveAlert
      summary: "Control — confirm (fraud) | dismiss (false positive); terminal"
      parameters: [{ $ref: "#/components/parameters/AlertId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [confirm, dismiss] }
                notes: { type: string }
      responses:
        "200": { description: Resolved alert }
        "400": { $ref: "#/components/responses/Invalid" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RuleViolation" }

components:
  parameters:
    AlertId:
      name: alertId
      in: path
      required: true
      schema: { type: string }

  responses:
    NotFound:
      description: Unknown alert
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RuleViolation:
      description: Alert already resolved (resolution is terminal)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Invalid:
      description: Bad input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    FraudAlert:
      type: object
      properties:
        alertId: { type: string, example: "FA-…" }
        accountRef: { type: string }
        sourceType: { type: string, enum: [TRANSACTION, CHEQUE] }
        sourceRef: { type: string }
        amountMinor: { type: integer, format: int64 }
        currency: { type: string }
        riskScore: { type: integer }
        reasons:
          type: array
          items: { type: string }
        status: { type: string, enum: [OPEN, CONFIRMED_FRAUD, FALSE_POSITIVE] }
        resolutionNotes: { type: string, nullable: true }
        raisedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }

    Error:
      type: object
      properties:
        code: { type: string, example: ALREADY_RESOLVED }
        message: { type: string }
