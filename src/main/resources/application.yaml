spring:
  application:
    name: sd-fraud-detection

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Fraud Detection"
    businessArea: "Risk and Compliance"
    businessDomain: "Financial Crime"
    functionalPattern: "Monitor"
    assetType: "Fraud Alert"
    controlRecord: "Fraud Alert Monitoring State"
    phase: "2b-deep"

bian:
  fraud:
    # Scoring model — see FraudDetectionService for rule weights.
    large-amount-minor: 1000000     # ₹10,000 in paise
    velocity-max-events: 5          # >5 activities inside the window → VELOCITY
    velocity-window-minutes: 10
    alert-threshold: 60

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Profile 'kafka': real event transport (gate 2). Without it, events log.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${BIAN_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
